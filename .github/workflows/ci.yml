name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Testy jednostkowe (fikstury_demo/ — testy prototypu, nie audyt kanonu)
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Audyt produkcyjny kanon/ (walidacja realnych danych, nie fikstur)
        run: python narzedzia/zbuduj_kanon.py
      - name: Czujniki spójności semantycznej (błędy blokują, ostrzeżenia są raportowane)
        run: python narzedzia/audyt_semantyczny.py
